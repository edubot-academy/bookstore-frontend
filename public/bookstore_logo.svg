<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">EduBook logo mark</title>
  <desc id="desc">A flat vector EduBook logo mark with an orange open book, deep teal book outline, graduation cap, and bookmark.</desc>

  <!-- Brand colors -->
  <defs>
    <style>
      .teal { fill: #0B4A59; }
      .orange { fill: #F97316; }
      .cream { fill: #FFF7EA; }
    </style>
  </defs>

  <!-- Graduation cap -->
  <path class="teal" d="M256 57L357 105L256 151L155 105L256 57Z"/>
  <path class="teal" d="M196 131C214 139 235 144 256 144C277 144 298 139 316 131V168C298 177 277 182 256 182C235 182 214 177 196 168V131Z"/>
  <path class="teal" d="M340 111H352V180H340V111Z"/>
  <circle class="teal" cx="346" cy="186" r="11"/>
  <path class="teal" d="M346 194L329 237H363L346 194Z"/>

  <!-- Outer book cover / frame -->
  <path class="teal" d="M72 242C72 232 80 224 90 224H111V348C151 359 192 382 237 427C247 437 265 437 275 427C320 382 361 359 401 348V224H422C432 224 440 232 440 242V371C440 382 432 392 421 394C375 403 329 427 286 468C269 484 243 484 226 468C183 427 137 403 91 394C80 392 72 382 72 371V242Z"/>

  <!-- White page separation cutouts -->
  <path class="cream" d="M113 350C152 360 191 381 235 422C247 433 265 433 277 422C321 381 360 360 399 350V330C353 342 311 366 273 401C263 410 249 410 239 401C201 366 159 342 113 330V350Z"/>

  <!-- Left orange page -->
  <path class="orange" d="M119 205C174 212 218 238 250 283V414C214 374 171 350 119 339V205Z"/>

  <!-- Right orange page -->
  <path class="orange" d="M393 205C338 212 294 238 262 283V414C298 374 341 350 393 339V205Z"/>

  <!-- Center white fold -->
  <path class="cream" d="M252 280H260V418C260 421 258 424 256 424C254 424 252 421 252 418V280Z"/>

  <!-- Knowledge/page burst -->
  <path class="orange" d="M251 195C251 188 256 183 256 183C256 183 261 188 261 195V268H251V195Z"/>
  <path class="orange" d="M206 207C229 221 242 240 247 269C224 246 211 227 206 207Z"/>
  <path class="orange" d="M306 207C283 221 270 240 265 269C288 246 301 227 306 207Z"/>

  <!-- Bookmark -->
  <path class="orange" d="M330 354H373V459L351.5 435L330 459V354Z"/>

  <!-- Small cream gap between bookmark and page -->
  <path class="cream" d="M323 350H331V442H323V350Z"/>
</svg>
